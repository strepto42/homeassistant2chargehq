name: HACS Validation

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Run HACS validation
        uses: hacs/action@main
        with:
          category: integration
          # The domain is not registered in the home-assistant/brands repo
          # (this integration ships local brand images instead), so skip that check.
          ignore: brands
